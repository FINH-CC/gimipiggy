; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
build_unflags =                       ; Suppress warnings about redefintion of CONFIG_SPIRAM_USE_MALLOC.
    -DCONFIG_SPIRAM_USE_MALLOC=0      ; Don't route malloc to PSRAM automatically.
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=1  ; Require explicit heap_caps_malloc for PSRAMboard_build.arduino.memory_type = qio_qspi
lib_deps = esphome/ESP32-audioI2S @ ^2.3.0
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
